groups:
  # ──────────────────────────────────────────────
  # dash0.gen_ai.conversations
  # ──────────────────────────────────────────────
  - id: metric.dash0.gen_ai.conversations
    type: metric
    metric_name: dash0.gen_ai.conversations
    stability: stable
    brief: >
      Counts the number of GenAI conversations ingested by Dash0.
    note: |
      `dash0.gen_ai.conversations` is a synthetic metric computed on-the-fly
      from the ingested span data.

      Deprecated PromQL alias: `dash0_gen_ai_conversations_total`.

      Synthetic metrics do not expose attributes by default. Attributes are
      materialised through PromQL aggregations.
    instrument: counter
    unit: "{conversation}"

  - id: metric.dash0_gen_ai_conversations_total
    type: metric
    metric_name: dash0_gen_ai_conversations_total
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: dash0.gen_ai.conversations
    brief: >
      Deprecated Prometheus alias for `dash0.gen_ai.conversations`.
    instrument: counter
    unit: "{conversation}"

  # ──────────────────────────────────────────────
  # dash0.gen_ai.conversations.duration
  # ──────────────────────────────────────────────
  - id: metric.dash0.gen_ai.conversations.duration
    type: metric
    metric_name: dash0.gen_ai.conversations.duration
    stability: stable
    brief: >
      Distribution of GenAI conversation durations.
    note: |
      `dash0.gen_ai.conversations.duration` is a synthetic metric computed
      on-the-fly from the ingested span data.

      Deprecated PromQL aliases: `dash0_gen_ai_conversations_duration_seconds_bucket`,
      `dash0_gen_ai_conversations_duration_seconds_sum`, `dash0_gen_ai_conversations_duration_seconds_count`.

      Synthetic metrics do not expose attributes by default. Attributes are
      materialised through PromQL aggregations.
    instrument: histogram
    unit: "s"

  - id: metric.dash0_gen_ai_conversations_duration_seconds
