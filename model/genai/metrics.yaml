  # ──────────────────────────────────────────────
  # dash0.gen_ai.conversations.info
  # ──────────────────────────────────────────────
  - id: metric.dash0.gen_ai.conversations.info
    type: metric
    metric_name: dash0.gen_ai.conversations.info
    stability: stable
    brief: >
      Identity / metadata mapping for a GenAI conversation.
    note: |
      `dash0.gen_ai.conversations.info` is a synthetic metric computed on-the-fly
      from the ingested span data. The value is always `1`; the info-style
      series exists to carry the conversation's metadata labels
      (`gen_ai.conversation.id`, `gen_ai.agent.name`, `gen_ai.provider.name`,
      `gen_ai.request.model`, `service.name`) so display-layer queries can
      join other GenAI metrics against it via PromQL `group_left`.

      Mirrors the pattern established by `dash0.slo.info` (ENG-7637). Not
      intended for alerting or trending — use the per-span counters /
      histograms (`dash0.gen_ai.chats.*`, `dash0.gen_ai.tokens.*`, etc.) for
      that.

      Deprecated PromQL alias: `dash0_gen_ai_conversations_info`.
    instrument: gauge
    unit: "1"

  - id: metric.dash0_gen_ai_conversations_info
    type: metric
    metric_name: dash0_gen_ai_conversations_info
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: dash0.gen_ai.conversations.info
    brief: >
      Deprecated Prometheus alias for `dash0.gen_ai.conversations.info`.
    instrument: gauge
    unit: "1"
