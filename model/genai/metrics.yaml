groups:
  # ──────────────────────────────────────────────
  # dash0.genai.conversation.count
  # ──────────────────────────────────────────────
  - id: metric.dash0.genai.conversation.count
    type: metric
    metric_name: dash0.genai.conversation.count
    stability: stable
    brief: >
      Counts the number of GenAI conversations ingested by Dash0.
    note: |
      `dash0.genai.conversation.count` is a synthetic metric computed on-the-fly
      from the ingested span data.

      Deprecated PromQL alias: `dash0_genai_conversation_count_total`.

      Synthetic metrics do not expose attributes by default. Attributes are
      materialised through PromQL aggregations.
    instrument: counter
    unit: "{conversation}"

  - id: metric.dash0_genai_conversation_count_total
    type: metric
    metric_name: dash0_genai_conversation_count_total
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: dash0.genai.conversation.count
    brief: >
      Deprecated Prometheus alias for `dash0.genai.conversation.count`.
    instrument: counter
    unit: "{conversation}"

  # ──────────────────────────────────────────────
  # dash0.genai.conversation.duration
  # ──────────────────────────────────────────────
  - id: metric.dash0.genai.conversation.duration
    type: metric
    metric_name: dash0.genai.conversation.duration
    stability: stable
    brief: >
      Distribution of GenAI conversation durations.
    note: |
      `dash0.genai.conversation.duration` is a synthetic metric computed
      on-the-fly from the ingested span data.

      Deprecated PromQL aliases: `dash0_genai_conversation_duration_seconds_bucket`,
      `dash0_genai_conversation_duration_seconds_sum`, `dash0_genai_conversation_duration_seconds_count`.

      Synthetic metrics do not expose attributes by default. Attributes are
      materialised through PromQL aggregations.
    instrument: histogram
    unit: "s"

  - id: metric.dash0_genai_conversation_duration_seconds
    type: metric
    metric_name: dash0_genai_conversation_duration_seconds
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: dash0.genai.conversation.duration
    brief: >
      Deprecated Prometheus alias for `dash0.genai.conversation.duration`.
    note: |
      Exposed in Prometheus as `dash0_genai_conversation_duration_seconds_bucket`,
      `dash0_genai_conversation_duration_seconds_sum`, and `dash0_genai_conversation_duration_seconds_count`.
    instrument: histogram
    unit: "s"

  # ──────────────────────────────────────────────
  # dash0.genai.conversation.errors
  # ──────────────────────────────────────────────
  - id: metric.dash0.genai.conversation.errors
    type: metric
    metric_name: dash0.genai.conversation.errors
    stability: stable
    brief: >
      Counts GenAI conversations that ended in an error.
    note: |
      `dash0.genai.conversation.errors` is a synthetic metric computed
      on-the-fly from the ingested span data.

      Deprecated PromQL alias: `dash0_genai_conversation_errors_total`.

      Synthetic metrics do not expose attributes by default. Attributes are
      materialised through PromQL aggregations.
    instrument: counter
    unit: "{error}"

  - id: metric.dash0_genai_conversation_errors_total
    type: metric
    metric_name: dash0_genai_conversation_errors_total
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: dash0.genai.conversation.errors
    brief: >
      Deprecated Prometheus alias for `dash0.genai.conversation.errors`.
    instrument: counter
    unit: "{error}"
