groups:
  # ──────────────────────────────────────────────
  # dash0.synthetic_check.runs
  # ──────────────────────────────────────────────
  - id: metric.dash0.synthetic_check.runs
    type: metric
    metric_name: dash0.synthetic_check.runs
    stability: stable
    brief: >
      Counts the number of synthetic check runs.
    note: |
      `dash0.synthetic_check.runs` is a synthetic metric computed on-the-fly from
      the synthetic check execution data.

      Deprecated PromQL alias: `dash0_synthetic_check_runs_total`.

      Synthetic metrics do not expose attributes by default. Attributes are
      materialised through PromQL aggregations.
    instrument: counter
    unit: "{run}"

  - id: metric.dash0_synthetic_check_runs_total
    type: metric
    metric_name: dash0_synthetic_check_runs_total
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: dash0.synthetic_check.runs
    brief: >
      Deprecated Prometheus alias for `dash0.synthetic_check.runs`.
    instrument: counter
    unit: "{run}"

