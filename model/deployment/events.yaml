imports:
  entities:
    - service
    - service.namespace
    - deployment

groups:
  - id: event.dash0.deployment
    type: event
    name: dash0.deployment
    stability: development
    brief: >
      Marks the deployment of a service version to an environment.
    note: |
      A `dash0.deployment` event SHOULD be emitted once per deployment, after
      the deployment has completed (successfully or not). It is intended to be
      sent from CI/CD pipelines (e.g., a GitHub Action).

      A deployment MUST be associated with a `service` resource and SHOULD be associated with a `deployment` resource.
      This can not be fully expressed in the schema, but Dash0 requires the following resource attributes to be set on the events resource:
      * `service.name`
      
      Additionally the following resource attributes SHOULD be set:
      * `service.version
      * `deployment.environment.name`
      * `deployment.name`
      * `deployment.id

      Finally a users may want to set the following resource attributes:
      * `service.namespace`
    attributes:
      - ref: deployment.status
        requirement_level: recommended

      - ref: vcs.repository.url.full
        requirement_level: opt_in
      - ref: vcs.ref.head.revision
        requirement_level: opt_in
      - ref: vcs.ref.head.name
        requirement_level: opt_in
