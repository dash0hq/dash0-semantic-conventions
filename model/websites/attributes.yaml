groups:
  - id: attributes.dash0.web_event
    type: attribute_group
    display_name: Web Event Attributes
    brief: >
      All attributes available on web events in Dash0.
    attributes:
      - ref: otel.event.name
      - ref: otel.scope.name
      - ref: otel.scope.version
      - ref: dash0.auth.token
      - ref: dash0.resource.id
      - ref: dash0.resource.hash
      - ref: dash0.resource.name
      - ref: dash0.resource.type
