groups:
  # ──────────────────────────────────────────────
  # dash0.spam_filters.logs
  # ──────────────────────────────────────────────
  - id: metric.dash0.spam_filters.logs
    type: metric
    metric_name: dash0.spam_filters.logs
    stability: development
    brief: >
      The number of log records dropped by spam filters.
    note: |
      Emitted by the Dash0 telemetry ingestion pipeline when [spam filters](https://www.dash0.com/documentation/dash0/cost-control/spam-filters) drop log records.
      Each data point is attributed to exactly one spam filter via the `dash0.spam_filter.id` attribute.
      Recorded as operational telemetry; it does not count towards the ingestion of the organization it is reported for.
    instrument: counter
    unit: "{log}"
    attributes:
      - ref: dash0.spam_filter.id
        requirement_level: required

