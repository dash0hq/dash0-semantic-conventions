groups:
  - id: registry.dash0.resource
    type: attribute_group
    display_name: Dash0 Resource Attributes
    brief: Resource attributes assigned by Dash0 at ingestion time or during collection.
    attributes:
      - id: dash0.auth.token
        type: string
        stability: stable
        brief: >
          Last 7 digits of the authentication token used to submit the telemetry to Dash0.
        note: |
          Set at ingestion time by the Dash0 backend.
          Useful for identifying which token was used when multiple authentication tokens are in use.
        examples: ["abc1234"]

      - id: dash0.resource.id
        type: string
        stability: stable
        brief: >
          Unique identifier for the resource in Dash0.
        note: |
          Computed at ingestion time by applying [resource equality rules](https://www.dash0.com/documentation/dash0/key-concepts/resouce-equality).
          Two telemetry items with the same `dash0.resource.id` are considered to originate
          from the same logical resource, even if their full attribute sets differ.
        examples: ["12958705279560104980"]

      - id: dash0.resource.hash
        type: string
        stability: stable
        brief: >
          Hash over all resource attributes of the incoming telemetry payload.
        note: |
          Computed at ingestion time by hashing all resource attributes in a deterministic
          (sorted) order. It is the most fine-grained resource identifier: each unique set of
          resource attributes produces a different hash.

          See [resource equality](https://www.dash0.com/documentation/dash0/key-concepts/resouce-equality)
          for how `dash0.resource.hash` relates to `dash0.resource.id`.
        examples: ["9283745019283745019"]

      - id: dash0.resource.name
        type: string
        stability: stable
        brief: >
          Human-readable name for the resource.
        note: |
          Derived at ingestion time from resource attributes using a precedence hierarchy
          (e.g., Kubernetes pod name, container name, service name). Can be overridden by
          setting the attribute before telemetry reaches Dash0.

          See [identify resources by name and type](https://www.dash0.com/documentation/dash0/monitoring/resources/identify-resources-by-name-and-type).
        examples: ["my-service-pod-abc123", "checkout-service"]

      - id: dash0.resource.type
        type: string
        stability: stable
        brief: >
          Classification of the resource kind.
        note: |
          Assigned at ingestion time based on the presence of technology-specific resource
          attributes. For example, the presence of `k8s.pod.uid` results in type `k8s.pod`.

          See [identify resources by name and type](https://www.dash0.com/documentation/dash0/monitoring/resources/identify-resources-by-name-and-type).
        examples: ["k8s.pod", "k8s.deployment", "host", "container", "aws.lambda", "gcp.cloud.run", "vercel.project", "browser"]

      - id: dash0.operator.collector_managed_by
        type: string
        stability: stable
        brief: >
          A marker attribute for telemetry collected by the Dash0 Kubernetes operator.
        note: |
          The collectors managed by the Dash0 Kubernetes operator add this resource attribute to all telemetry.
          If set, the value is always "dash0-operator".
        examples: ["dash0-operator"]

      - id: dash0.operator.collector_role
        type: string
        stability: stable
        brief: >
          The type of collector that collected the telemetry for this resource.
        note: |
          The Dash0 Kubernetes operator manages two types of OpenTelemetry collectors, a DaemonSet for node-local telemetry and
          a Deployment for collecting Kubernetes events and cluster-wide metrics.
          This attribute shows which collector type collected a particular telemetry signal.
          If set, the value is either "daemonset" or "deployment".
          Coalesced resources might combine telemetry from the DaemonSet collector as well as the Deployment collector, hence they
          might have both values.
        examples: ["daemonset", "deployment"]

      - id: dash0.operator.uid
        type: string
        stability: stable
        brief: >
          A UUID uniquely identifying the operator installation that produced the telemetry.
        note: |
          The collectors managed by the Dash0 Kubernetes operator add this resource attribute to all telemetry.
          It is stable across the life-time of the cluster.
        examples: ["e70c4b03-7e8d-432d-b2cd-addff593076e"]

      - id: dash0.operator.version
        type: string
        stability: stable
        brief: >
          The version of the Dash0 Kubernetes operator which collected the telemetry.
        note: |
          The collectors managed by the Dash0 Kubernetes operator add this resource attribute to all telemetry.
        examples: ["0.135.0"]
