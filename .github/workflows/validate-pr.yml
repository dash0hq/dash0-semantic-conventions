name: Validate PRs

on:
  pull_request:

jobs:
  validate-registry:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@6efae3022af925deab04aa70924cd501443fb7f9 # v0.21.2

      - name: Check model
        run: weaver registry check -r ./model --diagnostic-format gh_workflow_command

      - name: Resolve registry
        run: weaver registry resolve -r ./model -o resolved.json

  live-check-tests:
    name: Live-Check Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@6efae3022af925deab04aa70924cd501443fb7f9 # v0.21.2

      - name: Run valid live-check tests
        run: |
          failed=0
          count=$(find tests/valid -name '*.json' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No valid test files found"
            exit 1
          fi
          for file in $(find tests/valid -name '*.json' | sort); do
            echo "::group::Checking: $file"
            if weaver registry live-check -r ./model \
                --input-source "$file" --input-format json \
                --diagnostic-format gh_workflow_command; then
              echo "PASS: $file"
            else
              echo "::error::FAIL: $file should pass but didn't"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Run invalid live-check tests
        run: |
          failed=0
          count=$(find tests/invalid -name '*.json' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No invalid test files found"
            exit 1
          fi
          for file in $(find tests/invalid -name '*.json' | sort); do
            echo "::group::Checking: $file"
            if weaver registry live-check -r ./model \
                --input-source "$file" --input-format json; then
              echo "::error::FAIL: $file should fail but passed"
              failed=1
            else
              echo "PASS: $file (correctly rejected)"
            fi
            echo "::endgroup::"
          done
          exit $failed
